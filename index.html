<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>AnimeFlix</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background-color: #141414;
    color: white;
}

header {
    background-color: black;
    padding: 15px;
    font-size: 24px;
    color: red;
    font-weight: bold;
}

.section {
    margin: 20px;
}

.row {
    display: flex;
    overflow-x: auto;
}

.card {
    min-width: 200px;
    margin-right: 10px;
    transition: transform 0.3s;
    cursor: pointer;
}

.card img {
    width: 100%;
    border-radius: 5px;
}

.card:hover {
    transform: scale(1.1);
}

.player {
    display: none;
    position: fixed;
    top: 10%;
    left: 20%;
    width: 60%;
    height: 60%;
    background: black;
    padding: 10px;
}

.player iframe {
    width: 100%;
    height: 100%;
}

.close {
    position: absolute;
    top: 5px;
    right: 10px;
    cursor: pointer;
    font-size: 20px;
}
</style>

</head>

<body>

<header>AnimeFlix</header>

<div class="section">
    <h2>Populares</h2>
    <div class="row">

        <div class="card" onclick="playVideo('https://www.youtube.com/embed/d6kBeJjTGnY')">
            <img src="https://img.youtube.com/vi/d6kBeJjTGnY/hqdefault.jpg">
        </div>

        <div class="card" onclick="playVideo('https://www.youtube.com/embed/oqwsns7Z0eA')">
            <img src="https://img.youtube.com/vi/oqwsns7Z0eA/hqdefault.jpg">
        </div>

        <div class="card" onclick="playVideo('https://www.youtube.com/embed/VQGCKyvzIM4')">
            <img src="https://img.youtube.com/vi/VQGCKyvzIM4/hqdefault.jpg">
        </div>

    </div>
</div>

<div class="player" id="player">
    <span class="close" onclick="closePlayer()">X</span>
    <iframe id="videoFrame" src="" frameborder="0" allowfullscreen></iframe>
</div>

<script>
function playVideo(url) {
    document.getElementById("player").style.display = "block";
    document.getElementById("videoFrame").src = url;
}

function closePlayer() {
    document.getElementById("player").style.display = "none";
    document.getElementById("videoFrame").src = "";
}
</script>

</body>
</html>
